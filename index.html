<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We're Closed — That One Baking Place</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fdf6ec;
      --warm: #f5e6cc;
      --brown: #7b4f2e;
      --brown-light: #c4956a;
      --pink: #e8b4a0;
      --pink-light: #f5d9cf;
      --text: #4a2e1a;
      --muted: #9c7a5e;
    }

    body {
      background-color: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Polka dot background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, var(--pink-light) 1.5px, transparent 1.5px);
      background-size: 28px 28px;
      opacity: 0.5;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: white;
      border-radius: 24px;
      padding: 3rem 3.5rem;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(123, 79, 46, 0.12), 0 2px 8px rgba(123, 79, 46, 0.08);
      border: 1.5px solid var(--warm);
      animation: floatIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Decorative ribbon top */
    .ribbon {
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 6px;
      background: var(--pink);
      border-radius: 0 0 6px 6px;
    }

    /* Cute illustrated storefront */
    .illustration {
      margin: 0.5rem auto 1.5rem;
      width: 110px;
      height: 110px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 0.4rem;
      line-height: 1.2;
    }

    h1 em {
      font-style: italic;
      color: var(--brown-light);
    }

    .tagline {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 auto 1.8rem;
      max-width: 260px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--warm);
    }

    .divider span {
      font-size: 18px;
    }

    .contact-label {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
      font-weight: 400;
    }

    .email-link {
      display: inline-block;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--brown);
      text-decoration: none;
      border-bottom: 1.5px dashed var(--pink);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .email-link:hover {
      color: var(--brown-light);
      border-color: var(--brown-light);
    }

    /* little sprinkles */
    .sprinkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .sprinkle {
      position: absolute;
      border-radius: 3px;
      opacity: 0.35;
      animation: drift linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(-20px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.35; }
      90%  { opacity: 0.35; }
      to   { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .footer-note {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: var(--pink);
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="sprinkles" id="sprinkles"></div>

  <div class="card">
    <div class="ribbon"></div>

    <div class="illustration">
      <svg viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- shop awning -->
        <rect x="10" y="30" width="90" height="55" rx="6" fill="#f5d9cf"/>
        <rect x="10" y="30" width="90" height="55" rx="6" stroke="#e8b4a0" stroke-width="1.5"/>
        <!-- awning stripes -->
        <path d="M10 30 Q27.5 48 45 30 Q62.5 48 80 30 Q88 38 100 30" stroke="#e8b4a0" stroke-width="2" fill="none"/>
        <rect x="10" y="28" width="90" height="8" rx="3" fill="#e8b4a0"/>
        <!-- door -->
        <rect x="38" y="57" width="24" height="28" rx="4" fill="white" stroke="#c4956a" stroke-width="1.5"/>
        <circle cx="57" cy="71" r="2" fill="#c4956a"/>
        <!-- window -->
        <rect x="16" y="52" width="18" height="16" rx="3" fill="white" stroke="#c4956a" stroke-width="1.2"/>
        <line x1="25" y1="52" x2="25" y2="68" stroke="#c4956a" stroke-width="0.8"/>
        <line x1="16" y1="60" x2="34" y2="60" stroke="#c4956a" stroke-width="0.8"/>
        <!-- window right -->
        <rect x="76" y="52" width="18" height="16" rx="3" fill="white" stroke="#c4956a" stroke-width="1.2"/>
        <line x1="85" y1="52" x2="85" y2="68" stroke="#c4956a" stroke-width="0.8"/>
        <line x1="76" y1="60" x2="94" y2="60" stroke="#c4956a" stroke-width="0.8"/>
        <!-- sign -->
        <rect x="30" y="38" width="50" height="14" rx="4" fill="white" stroke="#c4956a" stroke-width="1"/>
        <text x="55" y="48.5" text-anchor="middle" font-family="serif" font-size="7" fill="#7b4f2e">CLOSED</text>
        <!-- chimney smoke puffs -->
        <circle cx="72" cy="20" r="4" fill="#f5d9cf" opacity="0.7"/>
        <circle cx="76" cy="13" r="3" fill="#f5d9cf" opacity="0.5"/>
        <circle cx="79" cy="8" r="2" fill="#f5d9cf" opacity="0.3"/>
        <!-- roof -->
        <path d="M5 32 L55 8 L105 32 Z" fill="#c4956a"/>
        <path d="M5 32 L55 8 L105 32 Z" stroke="#b07d50" stroke-width="1"/>
        <!-- chimney -->
        <rect x="68" y="14" width="8" height="18" rx="2" fill="#b07d50"/>
      </svg>
    </div>

    <h1>Sorry, we're <em>closed!</em></h1>
    <p class="tagline">Were take break.<br>Maybe come back sometime?</p>

    <div class="divider"><span>🍪</span></div>

    <p class="contact-label">Questions? Reach us at</p>
    <a href="mailto:thatonebakingplace@gmail.com" class="email-link">thatonebakingplace@gmail.com</a>


  </div>

  <script>
    const colors = ['#e8b4a0','#c4956a','#f5d9cf','#7b4f2e','#fde8d8'];
    const container = document.getElementById('sprinkles');
    for (let i = 0; i < 28; i++) {
      const s = document.createElement('div');
      s.className = 'sprinkle';
      const w = Math.random() * 6 + 3;
      const h = w * (Math.random() * 1.5 + 1);
      s.style.cssText = `
        width:${w}px; height:${h}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        animation-duration:${Math.random()*10+8}s;
        animation-delay:-${Math.random()*12}s;
        transform: rotate(${Math.random()*360}deg);
      `;
      container.appendChild(s);
    }
  </script>
</body>
</html>
